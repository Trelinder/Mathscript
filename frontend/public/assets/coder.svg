<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 95">
  <!-- Hair behind -->
  <ellipse cx="30" cy="18" rx="16" ry="17" fill="#5C3317"/>
  <!-- Head -->
  <circle cx="30" cy="22" r="15" fill="#FFCC99"/>
  <!-- Hair top -->
  <path d="M14 22 Q20 4 30 5 Q40 4 46 22" fill="#5C3317"/>
  <!-- Hair sides -->
  <path d="M14 22 Q13 27 15 30" stroke="#5C3317" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M46 22 Q47 27 45 30" stroke="#5C3317" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M21 15 Q25 13 28 15" stroke="#5C3317" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M32 15 Q35 13 39 15" stroke="#5C3317" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eye whites -->
  <ellipse cx="24" cy="21" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="36" cy="21" rx="5" ry="5.5" fill="white"/>
  <!-- Pupils -->
  <circle cx="25" cy="22" r="3" fill="#2255AA"/>
  <circle cx="37" cy="22" r="3" fill="#2255AA"/>
  <!-- Eye highlights -->
  <circle cx="26" cy="20" r="1.2" fill="white"/>
  <circle cx="38" cy="20" r="1.2" fill="white"/>
  <!-- Blush -->
  <ellipse cx="17" cy="27" rx="4" ry="2.5" fill="#FFB0B0" opacity="0.7"/>
  <ellipse cx="43" cy="27" rx="4" ry="2.5" fill="#FFB0B0" opacity="0.7"/>
  <!-- Mouth -->
  <path d="M25 30 Q30 35 35 30" stroke="#CC7755" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="26" y="36" width="8" height="7" rx="3" fill="#FFCC99"/>
  <!-- Shirt body -->
  <rect x="13" y="41" width="34" height="26" rx="7" fill="#5B9BD5"/>
  <!-- Shirt collar -->
  <polygon points="25,41 30,50 35,41" fill="white" opacity="0.9"/>
  <!-- Shirt button -->
  <circle cx="30" cy="55" r="1.8" fill="white" opacity="0.6"/>
  <!-- Left arm -->
  <rect x="4" y="43" width="10" height="19" rx="5" fill="#5B9BD5"/>
  <!-- Right arm -->
  <rect x="46" y="43" width="10" height="19" rx="5" fill="#5B9BD5"/>
  <!-- Left hand -->
  <circle cx="9" cy="63" r="5" fill="#FFCC99"/>
  <!-- Right hand -->
  <circle cx="51" cy="63" r="5" fill="#FFCC99"/>
  <!-- Pants left leg -->
  <rect x="15" y="66" width="12" height="22" rx="5" fill="#2D5090"/>
  <!-- Pants right leg -->
  <rect x="33" y="66" width="12" height="22" rx="5" fill="#2D5090"/>
  <!-- Left shoe -->
  <ellipse cx="21" cy="89" rx="9" ry="4" fill="#222244"/>
  <!-- Right shoe -->
  <ellipse cx="39" cy="89" rx="9" ry="4" fill="#222244"/>
</svg>
