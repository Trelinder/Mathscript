<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 95">
  <!-- Wizard hat brim -->
  <ellipse cx="30" cy="12" rx="18" ry="4" fill="#2A0A4A"/>
  <!-- Wizard hat cone -->
  <polygon points="30,0 14,12 46,12" fill="#4A1A7A"/>
  <!-- Hat stars -->
  <circle cx="30" cy="5" r="1.5" fill="#fbbf24"/>
  <circle cx="24" cy="9" r="1" fill="#fbbf24"/>
  <circle cx="37" cy="8" r="1" fill="#fbbf24"/>
  <!-- Head -->
  <circle cx="30" cy="22" r="13" fill="#FFCC99"/>
  <!-- White beard -->
  <path d="M20 28 Q17 38 18 44 Q22 50 30 51 Q38 50 42 44 Q43 38 40 28" fill="white" opacity="0.95"/>
  <!-- Eyebrows (bushy) -->
  <path d="M20 17 Q24 14 27 17" stroke="#9A7A5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M33 17 Q36 14 40 17" stroke="#9A7A5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="21" rx="4.5" ry="4.5" fill="white"/>
  <ellipse cx="36" cy="21" rx="4.5" ry="4.5" fill="white"/>
  <circle cx="24.5" cy="21.5" r="3" fill="#a855f7"/>
  <circle cx="36.5" cy="21.5" r="3" fill="#a855f7"/>
  <circle cx="25.5" cy="20.2" r="1.1" fill="white"/>
  <circle cx="37.5" cy="20.2" r="1.1" fill="white"/>
  <!-- Neck -->
  <rect x="26" y="34" width="8" height="6" rx="3" fill="#FFCC99"/>
  <!-- Robe body -->
  <rect x="11" y="38" width="38" height="30" rx="8" fill="#4A1A7A"/>
  <!-- Robe collar/trim -->
  <polygon points="25,38 30,47 35,38" fill="#c084fc" opacity="0.9"/>
  <!-- Magic orb glow on chest -->
  <circle cx="30" cy="55" r="5" fill="#a855f7" opacity="0.4"/>
  <circle cx="30" cy="55" r="3" fill="#e9d5ff"/>
  <!-- Left arm/sleeve -->
  <rect x="2" y="40" width="10" height="20" rx="5" fill="#4A1A7A"/>
  <!-- Right arm/sleeve (holds staff) -->
  <rect x="48" y="40" width="10" height="20" rx="5" fill="#4A1A7A"/>
  <!-- Left hand -->
  <circle cx="7" cy="61" r="4.5" fill="#FFCC99"/>
  <!-- Right hand -->
  <circle cx="53" cy="61" r="4.5" fill="#FFCC99"/>
  <!-- Staff -->
  <rect x="54" y="20" width="3" height="56" rx="1.5" fill="#7C5F30"/>
  <!-- Staff crystal -->
  <polygon points="55.5,16 52,22 59,22" fill="#e9d5ff"/>
  <circle cx="55.5" cy="18" r="3" fill="#a855f7" opacity="0.7"/>
  <!-- Robe bottom / legs -->
  <rect x="14" y="67" width="32" height="20" rx="6" fill="#3A0D63"/>
  <!-- Shoe tips -->
  <ellipse cx="22" cy="89" rx="8" ry="3.5" fill="#1A0A30"/>
  <ellipse cx="38" cy="89" rx="8" ry="3.5" fill="#1A0A30"/>
</svg>
