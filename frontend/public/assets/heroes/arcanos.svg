<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160" shape-rendering="geometricPrecision">
<defs>
  <radialGradient id="sk" cx="38%" cy="32%" r="58%">
    <stop offset="0%" stop-color="#ffe0bb"/><stop offset="65%" stop-color="#f4b87a"/><stop offset="100%" stop-color="#c97a45"/>
  </radialGradient>
  <linearGradient id="robe" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#6d28d9"/><stop offset="50%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#1e0538"/>
  </linearGradient>
  <linearGradient id="hat" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#5b21b6"/><stop offset="60%" stop-color="#3b0764"/><stop offset="100%" stop-color="#1e0538"/>
  </linearGradient>
  <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#fde68a"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#92400e"/>
  </linearGradient>
  <radialGradient id="orb" cx="30%" cy="25%" r="65%">
    <stop offset="0%" stop-color="#f0e6ff"/><stop offset="40%" stop-color="#c084fc"/><stop offset="80%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#3b0764"/>
  </radialGradient>
  <linearGradient id="beard" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#94a3b8"/>
  </linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="ds"><feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#1e0538" flood-opacity="0.55"/></filter>
  <filter id="pg" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
    <feFlood flood-color="#7c3aed" flood-opacity="0.55" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Ground shadow -->
<ellipse cx="50" cy="155" rx="30" ry="5" fill="rgba(0,0,0,0.18)"/>
