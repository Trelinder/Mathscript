<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 95">
  <!-- Hood back -->
  <ellipse cx="30" cy="20" rx="16" ry="17" fill="#0C2A3A"/>
  <!-- Ninja mask covering lower face -->
  <rect x="13" y="24" width="34" height="13" rx="5" fill="#0E3A4A"/>
  <!-- Head/skin (eyes only visible) -->
  <circle cx="30" cy="22" r="13" fill="#FFCC99"/>
  <!-- Forehead wrapping -->
  <rect x="14" y="12" width="32" height="8" rx="4" fill="#0C2A3A"/>
  <!-- Eyes (sharp, cyan) -->
  <ellipse cx="24" cy="21" rx="5" ry="4.5" fill="white"/>
  <ellipse cx="36" cy="21" rx="5" ry="4.5" fill="white"/>
  <circle cx="24.5" cy="21.5" r="3" fill="#00c8ff"/>
  <circle cx="36.5" cy="21.5" r="3" fill="#00c8ff"/>
  <circle cx="25.5" cy="20" r="1.1" fill="white"/>
  <circle cx="37.5" cy="20" r="1.1" fill="white"/>
  <!-- Eye glow (stealth mode) -->
  <ellipse cx="24.5" cy="21.5" rx="5.5" ry="5" fill="none" stroke="#00c8ff" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="36.5" cy="21.5" rx="5.5" ry="5" fill="none" stroke="#00c8ff" stroke-width="0.8" opacity="0.5"/>
  <!-- Hood top -->
  <path d="M14 18 Q18 4 30 4 Q42 4 46 18" fill="#0C2A3A"/>
  <!-- Neck wrapping -->
  <rect x="24" y="34" width="12" height="8" rx="3" fill="#0C2A3A"/>
  <!-- Ninja suit body -->
  <rect x="11" y="40" width="38" height="27" rx="6" fill="#0A2030"/>
  <!-- Suit detail lines -->
  <line x1="30" y1="42" x2="30" y2="66" stroke="#00c8ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="11" y1="53" x2="49" y2="53" stroke="#00c8ff" stroke-width="0.8" opacity="0.3"/>
  <!-- Chest symbol (shuriken) -->
  <polygon points="30,46 31.5,50 30,54 28.5,50" fill="#00c8ff" opacity="0.7"/>
  <polygon points="26,48 30,49.5 34,48 30,50.5" fill="#00c8ff" opacity="0.7"/>
  <!-- Utility belt -->
  <rect x="11" y="62" width="38" height="5" rx="2.5" fill="#0E3A4A"/>
  <circle cx="30" cy="64.5" r="2.5" fill="#00c8ff" opacity="0.6"/>
  <!-- Left arm (slightly raised — guard) -->
  <rect x="2" y="40" width="10" height="20" rx="5" fill="#0A2030" transform="rotate(-12 7 45)"/>
  <!-- Right arm -->
  <rect x="48" y="40" width="10" height="20" rx="5" fill="#0A2030"/>
  <!-- Wrapping on forearms -->
  <rect x="2" y="50" width="10" height="9" rx="3" fill="#0E3A4A" transform="rotate(-12 7 55)"/>
  <rect x="48" y="52" width="10" height="8" rx="3" fill="#0E3A4A"/>
  <!-- Left hand (covered) -->
  <circle cx="5" cy="62" r="4" fill="#0A2030"/>
  <!-- Right hand (covered) -->
  <circle cx="53" cy="61" r="4" fill="#0A2030"/>
  <!-- Glow on hands -->
  <circle cx="5" cy="62" r="5.5" fill="none" stroke="#00c8ff" stroke-width="1" opacity="0.4"/>
  <!-- Pants (stealthy) -->
  <rect x="13" y="66" width="13" height="21" rx="5" fill="#071620"/>
  <rect x="34" y="66" width="13" height="21" rx="5" fill="#071620"/>
  <!-- Shin wrappings -->
  <rect x="13" y="74" width="13" height="6" rx="3" fill="#0E3A4A"/>
  <rect x="34" y="74" width="13" height="6" rx="3" fill="#0E3A4A"/>
  <!-- Ninja boots (toe-split style) -->
  <ellipse cx="20" cy="89" rx="9" ry="4" fill="#040E18"/>
  <ellipse cx="40" cy="89" rx="9" ry="4" fill="#040E18"/>
  <!-- Boot cyan trim -->
  <path d="M12 89 Q16 86 20 87" stroke="#00c8ff" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M32 89 Q36 86 40 87" stroke="#00c8ff" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
