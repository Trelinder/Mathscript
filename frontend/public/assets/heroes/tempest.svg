<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160" shape-rendering="geometricPrecision">
<defs>
  <radialGradient id="sk" cx="38%" cy="32%" r="58%">
    <stop offset="0%" stop-color="#ffe0bb"/><stop offset="65%" stop-color="#f4b87a"/><stop offset="100%" stop-color="#c97a45"/>
  </radialGradient>
  <linearGradient id="coat" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1d4ed8"/><stop offset="50%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#172554"/>
  </linearGradient>
  <linearGradient id="coatH" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </linearGradient>
  <linearGradient id="cape" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e40af"/><stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>
  <linearGradient id="hair" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1d4ed8"/><stop offset="50%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#bfdbfe"/>
  </linearGradient>
  <radialGradient id="wind" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.8"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="ds"><feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#172554" flood-opacity="0.5"/></filter>
  <filter id="bglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
    <feFlood flood-color="#3b82f6" flood-opacity="0.5" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Ground shadow -->
<ellipse cx="50" cy="155" rx="30" ry="5" fill="rgba(0,0,0,0.18)"/>
<!-- Wind aura -->
<circle cx="50" cy="88" r="44" fill="rgba(59,130,246,0.07)"/>
<!-- Wind swirl effects behind -->
<path d="M88 50 Q96 60 92 72 Q86 78 80 74" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>
<path d="M90 58 Q96 66 93 75" stroke="#93c5fd" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.25"/>
<!-- Windswept cape behind right side -->
<path d="M76 64 Q92 58 98 74 Q100 88 92 98 Q86 104 78 100 Q76 92 76 82" fill="url(#cape)" opacity="0.85" filter="url(#ds)"/>
<path d="M78 66 Q90 62 95 74" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" fill="none"/>
<!-- Legs -->
<rect x="28" y="108" width="18" height="38" rx="6" fill="#172554"/>
<rect x="54" y="108" width="18" height="38" rx="6" fill="#172554"/>
<path d="M30 110 Q29 130 29 146" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" fill="none"/>
<!-- Boots -->
<ellipse cx="37" cy="148" rx="11" ry="4.5" fill="#0c1445"/>
<ellipse cx="63" cy="148" rx="11" ry="4.5" fill="#0c1445"/>
<path d="M28 144 Q32 148 44 150" stroke="#60a5fa" stroke-width="1" fill="none" opacity="0.45"/>
<path d="M54 144 Q58 148 70 150" stroke="#60a5fa" stroke-width="1" fill="none" opacity="0.45"/>
<!-- Body coat torso -->
<path d="M26 72 Q21 90 22 108 Q36 116 50 116 Q64 116 78 108 Q79 90 74 72 Z" fill="url(#coat)" filter="url(#ds)"/>
<path d="M26 72 Q21 90 22 108 Q36 116 50 116" fill="url(#coatH)"/>
<!-- Coat interior lining -->
<path d="M38 72 Q35 84 35 102" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.3"/>
<path d="M62 72 Q65 84 65 102" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.3"/>
<!-- Collar / lapels -->
<path d="M36 72 Q40 66 50 64 Q60 66 64 72 Q57 76 50 75 Q43 76 36 72" fill="#1e40af"/>
<path d="M37 72 Q40 68 50 66" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>
<!-- Belt -->
<rect x="27" y="104" width="46" height="7" rx="3.5" fill="#0f172a"/>
<circle cx="50" cy="107.5" r="3.5" fill="#3b82f6" filter="url(#glow)"/>
<!-- Shoulder straps -->
<path d="M26 72 Q16 66 14 74 Q15 80 22 82 Q24 80 24 76" fill="#1d4ed8"/>
<ellipse cx="17" cy="72" rx="5" ry="6" fill="rgba(255,255,255,0.12)" transform="rotate(-8 17 72)"/>
<!-- Left arm + slight raise (channeling wind) -->
<path d="M22 74 Q9 78 6 90 Q5 100 11 103 Q19 101 22 92 Q25 81 24 74" fill="url(#coat)" transform="rotate(8 18 82)"/>
<path d="M20 78 Q13 86 12 96" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" fill="none"/>
<!-- Wind ring around left hand -->
<circle cx="8" cy="106" r="7.5" fill="url(#sk)"/>
<circle cx="8" cy="106" r="10" fill="none" stroke="#93c5fd" stroke-width="1.2" opacity="0.5" filter="url(#glow)"/>
<circle cx="8" cy="106" r="13" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
<!-- Right arm -->
<path d="M74 74 Q86 82 88 96 Q88 105 82 107 Q75 104 74 94 Q73 82 74 74" fill="url(#coat)"/>
<!-- Right hand -->
<circle cx="86" cy="109" r="7.5" fill="url(#sk)"/>
<!-- Neck -->
<rect x="43" y="57" width="14" height="13" rx="5" fill="url(#sk)"/>
<!-- Head aura -->
<circle cx="50" cy="39" r="28" fill="rgba(59,130,246,0.08)"/>
<!-- Head -->
<ellipse cx="50" cy="39" rx="22" ry="24" fill="url(#sk)" filter="url(#ds)"/>
<ellipse cx="44" cy="34" rx="13" ry="14" fill="rgba(255,255,255,0.08)"/>
<!-- Cheek shadow -->
<ellipse cx="33" cy="45" rx="7" ry="4.5" fill="rgba(180,90,40,0.12)"/>
<ellipse cx="67" cy="45" rx="7" ry="4.5" fill="rgba(180,90,40,0.12)"/>
<!-- Ears -->
<path d="M28 38 Q23 37 22 41 Q23 46 28 46 Q30 46 31 42 Q31 38 28 38" fill="url(#sk)"/>
<path d="M72 38 Q77 37 78 41 Q77 46 72 46 Q70 46 69 42 Q69 38 72 38" fill="url(#sk)"/>
<!-- Windswept hair (swept to the right) -->
<path d="M28 36 Q25 14 36 8 Q40 18 41 10 Q44 4 48 13 Q49 5 52 12 Q55 5 58 14 Q61 7 66 18 Q70 24 74 20 Q80 16 84 18" fill="url(#hair)" filter="url(#ds)"/>
<!-- Hair wind streaks -->
<path d="M66 20 Q74 14 82 16" stroke="#bfdbfe" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
<path d="M68 25 Q76 21 84 22" stroke="#93c5fd" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
<!-- Hair highlight -->
<path d="M30 34 Q28 20 36 12 Q38 20 40 14" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none"/>
<!-- Eyes - blue, thoughtful -->
<ellipse cx="40" cy="37" rx="6" ry="6.5" fill="white"/>
<circle cx="40.5" cy="37.5" r="4.5" fill="#1d4ed8"/>
<circle cx="40.5" cy="37.5" r="3" fill="#0c1445"/>
<circle cx="38.5" cy="35.5" r="1.8" fill="white" opacity="0.9"/>
<circle cx="43" cy="39.5" r="0.8" fill="white" opacity="0.5"/>
<ellipse cx="40.5" cy="37.5" rx="5.5" ry="6" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.45"/>
<ellipse cx="60" cy="37" rx="6" ry="6.5" fill="white"/>
<circle cx="60.5" cy="37.5" r="4.5" fill="#1d4ed8"/>
<circle cx="60.5" cy="37.5" r="3" fill="#0c1445"/>
<circle cx="58.5" cy="35.5" r="1.8" fill="white" opacity="0.9"/>
<circle cx="63" cy="39.5" r="0.8" fill="white" opacity="0.5"/>
<ellipse cx="60.5" cy="37.5" rx="5.5" ry="6" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.45"/>
<!-- Serious raised eyebrows -->
<path d="M33 28 Q38 25 44 27" stroke="#1e40af" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M56 27 Q62 25 67 28" stroke="#1e40af" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<!-- Nose -->
<path d="M47 41 Q45 46 47.5 50 Q50 52 52.5 50 Q55 46 53 41" fill="rgba(200,110,60,0.28)"/>
<!-- Mouth (analytical) -->
<path d="M42 58 Q47 61 50 61 Q53 61 58 58" stroke="#a0614a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
<!-- Wind particles -->
<circle cx="82" cy="28" r="3" fill="#60a5fa" opacity="0.65" filter="url(#glow)"/>
<path d="M78 26 Q82 24 86 26" stroke="#93c5fd" stroke-width="1" fill="none" opacity="0.6"/>
<circle cx="16" cy="42" r="2.5" fill="#93c5fd" opacity="0.55" filter="url(#glow)"/>
<path d="M12 40 Q16 38 20 40" stroke="#bfdbfe" stroke-width="0.9" fill="none" opacity="0.55"/>
<circle cx="86" cy="68" r="2" fill="#60a5fa" opacity="0.5"/>
<circle cx="14" cy="88" r="1.5" fill="#93c5fd" opacity="0.4"/>
</svg>
