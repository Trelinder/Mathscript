<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160" shape-rendering="geometricPrecision">
<defs>
  <radialGradient id="sk" cx="38%" cy="32%" r="58%">
    <stop offset="0%" stop-color="#ffe0bb"/><stop offset="65%" stop-color="#f4b87a"/><stop offset="100%" stop-color="#c97a45"/>
  </radialGradient>
  <linearGradient id="armor" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#16a34a"/><stop offset="50%" stop-color="#15803d"/><stop offset="100%" stop-color="#052e16"/>
  </linearGradient>
  <linearGradient id="armorH" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </linearGradient>
  <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#22c55e"/><stop offset="50%" stop-color="#16a34a"/><stop offset="100%" stop-color="#052e16"/>
  </linearGradient>
  <linearGradient id="hair" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#166534"/><stop offset="100%" stop-color="#052e16"/>
  </linearGradient>
  <radialGradient id="core" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#bbf7d0"/><stop offset="40%" stop-color="#22c55e"/><stop offset="80%" stop-color="#15803d"/><stop offset="100%" stop-color="#052e16"/>
  </radialGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="ds"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#052e16" flood-opacity="0.55"/></filter>
  <filter id="gglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
    <feFlood flood-color="#22c55e" flood-opacity="0.5" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Ground shadow (wide for big character) -->
<ellipse cx="50" cy="155" rx="38" ry="6" fill="rgba(0,0,0,0.2)"/>
<!-- Power aura -->
<circle cx="50" cy="88" r="48" fill="rgba(34,197,94,0.07)"/>
<!-- Legs (wider) -->
<rect x="22" y="108" width="22" height="38" rx="7" fill="#052e16"/>
<rect x="56" y="108" width="22" height="38" rx="7" fill="#052e16"/>
<!-- Knee armor plates -->
<rect x="22" y="118" width="22" height="12" rx="5" fill="#15803d"/>
<rect x="56" y="118" width="22" height="12" rx="5" fill="#15803d"/>
<path d="M24 120 Q23 126 24 130" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" fill="none"/>
<path d="M58 120 Q57 126 58 130" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" fill="none"/>
<!-- Boots (heavy) -->
<ellipse cx="33" cy="148" rx="14" ry="5.5" fill="#021b0e"/>
<ellipse cx="67" cy="148" rx="14" ry="5.5" fill="#021b0e"/>
<path d="M21 144 Q27 149 44 151" stroke="#22c55e" stroke-width="1.2" fill="none" opacity="0.4"/>
<path d="M55 144 Q61 149 76 151" stroke="#22c55e" stroke-width="1.2" fill="none" opacity="0.4"/>
<!-- Torso armor (very wide) -->
<path d="M16 68 Q10 88 12 108 Q30 118 50 118 Q70 118 88 108 Q90 88 84 68 Z" fill="url(#armor)" filter="url(#ds)"/>
<path d="M16 68 Q10 88 12 108 Q30 118 50 118" fill="url(#armorH)"/>
<!-- Chest armor plate (central) -->
<path d="M26 68 Q22 84 23 102 Q36 110 50 110 Q64 110 77 102 Q78 84 74 68 Z" fill="url(#plate)"/>
<path d="M27 68 Q24 84 25 100" stroke="rgba(255,255,255,0.12)" stroke-width="2.5" fill="none"/>
<!-- Armor ridges -->
<path d="M32 75 L32 100" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" fill="none"/>
<path d="M68 75 L68 100" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" fill="none"/>
<!-- Power core / gem on chest -->
<circle cx="50" cy="88" r="12" fill="#052e16" filter="url(#gglow)"/>
<circle cx="50" cy="88" r="10" fill="url(#core)"/>
<circle cx="46" cy="84" r="4" fill="rgba(255,255,255,0.4)"/>
<circle cx="50" cy="88" r="10.5" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
<!-- Power radiating lines -->
<path d="M50 76 L50 72" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
<path d="M62 88 L66 88" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
<path d="M38 88 L34 88" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
<path d="M50 100 L50 104" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
<!-- Belt armored -->
<rect x="20" y="104" width="60" height="8" rx="4" fill="#021b0e"/>
<rect x="43" y="104" width="14" height="8" rx="2" fill="#052e16"/>
<circle cx="50" cy="108" r="4" fill="url(#core)" filter="url(#glow)"/>
<!-- Massive shoulder plates -->
<path d="M16 68 Q4 60 2 70 Q3 82 12 86 Q16 84 16 76" fill="url(#plate)"/>
<path d="M84 68 Q96 60 98 70 Q97 82 88 86 Q84 84 84 76" fill="url(#plate)"/>
<ellipse cx="5" cy="72" rx="5" ry="7" fill="rgba(255,255,255,0.14)" transform="rotate(-10 5 72)"/>
<ellipse cx="95" cy="72" rx="5" ry="7" fill="rgba(255,255,255,0.14)" transform="rotate(10 95 72)"/>
<!-- Shoulder bolts -->
<circle cx="10" cy="76" r="2.5" fill="#4ade80" filter="url(#glow)"/>
<circle cx="90" cy="76" r="2.5" fill="#4ade80" filter="url(#glow)"/>
