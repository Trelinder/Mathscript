<path d="M14 70 Q1 80 0 96 Q0 106 7 108 Q16 106 18 96 Q20 84 16 70" fill="url(#armor)"/>
<path d="M12 74 Q5 84 4 98" stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="none"/>
