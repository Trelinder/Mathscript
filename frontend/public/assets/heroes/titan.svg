<rect x="1" y="100" width="15" height="10" rx="4" fill="#052e16"/>
<path d="M2 102 Q4 106 4 110" stroke="#4ade80" stroke-width="1" fill="none" opacity="0.5"/>
<rect x="84" y="70" width="16" height="38" rx="8" fill="url(#armor)"/>
<rect x="84" y="100" width="15" height="10" rx="4" fill="#052e16"/>
<path d="M94 102 Q93 106 93 110" stroke="#4ade80" stroke-width="1" fill="none" opacity="0.5"/>
<!-- Left fist (large) -->
<circle cx="9" cy="111" r="9" fill="url(#sk)"/>
<ellipse cx="7" cy="107" rx="4.5" ry="3" fill="url(#sk)"/>
<!-- Green energy fist glow -->
<circle cx="9" cy="111" r="11" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
<!-- Right fist (large) -->
<circle cx="91" cy="111" r="9" fill="url(#sk)"/>
<ellipse cx="93" cy="107" rx="4.5" ry="3" fill="url(#sk)"/>
<circle cx="91" cy="111" r="11" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
<!-- Neck (thick) -->
<rect x="41" y="56" width="18" height="13" rx="5" fill="url(#sk)"/>
<!-- Head aura -->
<circle cx="50" cy="39" r="30" fill="rgba(34,197,94,0.08)"/>
<!-- Head (wide, powerful) -->
<ellipse cx="50" cy="39" rx="24" ry="23" fill="url(#sk)" filter="url(#ds)"/>
<ellipse cx="44" cy="34" rx="14" ry="14" fill="rgba(255,255,255,0.08)"/>
<!-- Cheek shadow -->
<ellipse cx="32" cy="46" rx="8" ry="5.5" fill="rgba(180,90,40,0.12)"/>
<ellipse cx="68" cy="46" rx="8" ry="5.5" fill="rgba(180,90,40,0.12)"/>
<!-- Ears -->
<path d="M26 38 Q20 37 19 42 Q20 48 26 48 Q28 48 29 44 Q29 38 26 38" fill="url(#sk)"/>
<path d="M74 38 Q80 37 81 42 Q80 48 74 48 Q72 48 71 44 Q71 38 74 38" fill="url(#sk)"/>
<!-- Short strong hair -->
<path d="M26 34 Q25 18 34 11 Q38 20 40 13 Q44 5 48 14 Q49 6 52 14 Q55 6 59 14 Q63 20 66 30" fill="url(#hair)" filter="url(#ds)"/>
<!-- Headband -->
<rect x="24" y="24" width="52" height="7" rx="3.5" fill="#15803d"/>
<rect x="24" y="24" width="52" height="2.5" rx="2" fill="rgba(255,255,255,0.1)"/>
<!-- Headband symbol -->
<text x="50" y="30.5" text-anchor="middle" font-size="7" fill="#4ade80" font-family="sans-serif" filter="url(#glow)" opacity="0.9">力</text>
<!-- Eyes (strong, green) -->
<ellipse cx="40" cy="38" rx="6.5" ry="6.5" fill="white"/>
<circle cx="40.5" cy="38.5" r="5" fill="#15803d"/>
<circle cx="40.5" cy="38.5" r="3.5" fill="#052e16"/>
<circle cx="38.5" cy="36.5" r="1.8" fill="white" opacity="0.9"/>
<circle cx="43" cy="40.5" r="0.8" fill="white" opacity="0.5"/>
<ellipse cx="40.5" cy="38.5" rx="6" ry="6" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.5"/>
<ellipse cx="60" cy="38" rx="6.5" ry="6.5" fill="white"/>
<circle cx="60.5" cy="38.5" r="5" fill="#15803d"/>
<circle cx="60.5" cy="38.5" r="3.5" fill="#052e16"/>
<circle cx="58.5" cy="36.5" r="1.8" fill="white" opacity="0.9"/>
<circle cx="63" cy="40.5" r="0.8" fill="white" opacity="0.5"/>
<ellipse cx="60.5" cy="38.5" rx="6" ry="6" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.5"/>
<!-- Thick brows -->
<path d="M32 29 Q37 25.5 44 28" stroke="#145a2d" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M56 28 Q63 25.5 68 29" stroke="#145a2d" stroke-width="4" fill="none" stroke-linecap="round"/>
<!-- Brow highlight -->
<path d="M33 29 Q38 27 43 28" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<path d="M57 28 Q62 27 67 29" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<!-- Nose (strong) -->
<path d="M47 42 Q45 47 47.5 51 Q50 53 52.5 51 Q55 47 53 42" fill="rgba(200,110,60,0.3)"/>
<!-- Confident set mouth -->
<path d="M41 57 Q46 60 50 60 Q54 60 59 57" stroke="#a0614a" stroke-width="2" fill="none" stroke-linecap="round"/>
<!-- Power particles -->
<circle cx="14" cy="26" r="3" fill="#22c55e" opacity="0.7" filter="url(#glow)"/>
<path d="M12 24 L13 20 M11 26 L8 25 M13 21 L15 19" stroke="#4ade80" stroke-width="1" opacity="0.65"/>
<circle cx="86" cy="34" r="2.5" fill="#22c55e" opacity="0.6" filter="url(#glow)"/>
<path d="M84 32 L85 29 M83 34 L80 33 M85 30 L87 28" stroke="#4ade80" stroke-width="0.9" opacity="0.55"/>
</svg>
