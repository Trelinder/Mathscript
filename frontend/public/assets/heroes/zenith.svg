<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160" shape-rendering="geometricPrecision">
<defs>
  <radialGradient id="sk" cx="38%" cy="32%" r="58%">
    <stop offset="0%" stop-color="#ffe0bb"/><stop offset="65%" stop-color="#f4b87a"/><stop offset="100%" stop-color="#c97a45"/>
  </radialGradient>
  <linearGradient id="suit" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#d97706"/><stop offset="50%" stop-color="#b45309"/><stop offset="100%" stop-color="#78350f"/>
  </linearGradient>
  <linearGradient id="suitH" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </linearGradient>
  <linearGradient id="goggle" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fde68a"/><stop offset="50%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/>
  </linearGradient>
  <linearGradient id="hair" x1="0%" y1="100%" x2="60%" y2="0%">
    <stop offset="0%" stop-color="#b45309"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fef08a"/>
  </linearGradient>
  <radialGradient id="lens" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#fef9c3"/><stop offset="50%" stop-color="#fbbf24" stop-opacity="0.7"/><stop offset="100%" stop-color="#78350f" stop-opacity="0.5"/>
  </radialGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="ds"><feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#78350f" flood-opacity="0.5"/></filter>
  <filter id="lglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
    <feFlood flood-color="#fbbf24" flood-opacity="0.5" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Ground shadow -->
<ellipse cx="50" cy="155" rx="30" ry="5" fill="rgba(0,0,0,0.18)"/>
<!-- Energy aura -->
<circle cx="50" cy="88" r="44" fill="rgba(245,158,11,0.06)"/>
<!-- Speed lines behind -->
<path d="M2 60 L18 62" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
<path d="M2 68 L20 69" stroke="#fbbf24" stroke-width="0.8" opacity="0.25"/>
<path d="M2 76 L16 77" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
<!-- Legs -->
<rect x="27" y="108" width="19" height="38" rx="7" fill="#78350f"/>
<rect x="54" y="108" width="19" height="38" rx="7" fill="#78350f"/>
<path d="M29 110 Q28 130 28 146" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" fill="none"/>
<path d="M56 110 Q55 130 55 146" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" fill="none"/>
<!-- Knee pads -->
<ellipse cx="36.5" cy="122" rx="8" ry="5" fill="#b45309"/>
<ellipse cx="63.5" cy="122" rx="8" ry="5" fill="#b45309"/>
<!-- Boots -->
<ellipse cx="36" cy="148" rx="11" ry="4.5" fill="#451a03"/>
<ellipse cx="64" cy="148" rx="11" ry="4.5" fill="#451a03"/>
<path d="M27 144 Q31 148 43 150" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.45"/>
<path d="M54 144 Q58 148 70 150" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.45"/>
<!-- Body suit torso -->
<path d="M24 72 Q20 88 22 108 Q36 115 50 115 Q64 115 78 108 Q80 88 76 72 Z" fill="url(#suit)" filter="url(#ds)"/>
<path d="M24 72 Q20 88 22 108 Q36 115 50 115 Q64 115 78 108 Q80 88 76 72 Z" fill="url(#suitH)"/>
<!-- Lightning bolt stripe on suit -->
<path d="M50 76 L44 92 L50 89 L44 108" stroke="#fbbf24" stroke-width="2.5" fill="none" filter="url(#glow)" opacity="0.9"/>
<path d="M50 76 L44 92 L50 89 L44 108" stroke="#fef08a" stroke-width="1" fill="none" opacity="0.5"/>
<!-- Side racing stripes -->
<path d="M25 78 Q24 92 24 106" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.5"/>
<path d="M75 78 Q76 92 76 106" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.5"/>
<!-- Belt / utility belt -->
<rect x="25" y="104" width="50" height="7" rx="3.5" fill="#451a03"/>
<circle cx="50" cy="107.5" r="3.5" fill="#fbbf24" filter="url(#glow)"/>
<rect x="35" y="105" width="6" height="5" rx="1.5" fill="#78350f"/>
<rect x="59" y="105" width="6" height="5" rx="1.5" fill="#78350f"/>
<!-- Shoulder pads -->
<path d="M24 72 Q15 66 13 74 Q14 80 22 82 Q24 80 24 76" fill="#b45309"/>
<path d="M76 72 Q85 66 87 74 Q86 80 78 82 Q76 80 76 76" fill="#b45309"/>
<!-- Left arm -->
<path d="M22 74 Q10 82 8 96 Q8 105 14 107 Q22 104 24 94 Q26 83 24 74" fill="url(#suit)"/>
<path d="M20 78 Q14 88 13 98" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" fill="none"/>
<!-- Wrist tech guard -->
<rect x="8" y="99" width="14" height="7" rx="3" fill="#451a03"/>
<circle cx="15" cy="102.5" r="2" fill="#fbbf24" opacity="0.8" filter="url(#glow)"/>
<!-- Right arm -->
<path d="M76 74 Q88 82 90 96 Q90 105 84 107 Q76 104 74 94 Q72 83 74 74" fill="url(#suit)"/>
<rect x="78" y="99" width="14" height="7" rx="3" fill="#451a03"/>
<circle cx="85" cy="102.5" r="2" fill="#fbbf24" opacity="0.8" filter="url(#glow)"/>
<!-- Left hand -->
<circle cx="11" cy="109" r="7.5" fill="url(#sk)"/>
<!-- Right hand -->
<circle cx="89" cy="109" r="7.5" fill="url(#sk)"/>
<!-- Neck -->
<rect x="43" y="57" width="14" height="13" rx="5" fill="url(#sk)"/>
<!-- Head -->
<ellipse cx="50" cy="40" rx="22" ry="23" fill="url(#sk)" filter="url(#ds)"/>
<ellipse cx="44" cy="35" rx="13" ry="14" fill="rgba(255,255,255,0.08)"/>
<!-- Ears -->
<path d="M28 39 Q23 38 22 42 Q23 47 28 47 Q30 47 31 43 Q31 39 28 39" fill="url(#sk)"/>
<path d="M72 39 Q77 38 78 42 Q77 47 72 47 Q70 47 69 43 Q69 39 72 39" fill="url(#sk)"/>
<!-- Spiky swept-back hair -->
<path d="M28 34 Q25 14 35 8 Q38 18 39 11 Q43 3 46 13 Q47 4 51 11 Q55 3 57 13 Q60 5 64 14 Q68 20 66 30 Q72 20 78 22" fill="url(#hair)" filter="url(#ds)"/>
<!-- Hair highlight -->
<path d="M30 32 Q28 18 36 10 Q38 18 40 13" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
<!-- Goggles band -->
<rect x="24" y="30" width="52" height="10" rx="5" fill="#1c1917"/>
<rect x="24" y="30" width="52" height="3" rx="3" fill="rgba(255,255,255,0.08)"/>
<!-- Goggle lenses -->
<ellipse cx="38" cy="35" rx="10" ry="9" fill="#451a03"/>
<ellipse cx="38" cy="35" rx="9.5" ry="8.5" fill="url(#lens)"/>
<ellipse cx="38" cy="35" rx="9.5" ry="8.5" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
<ellipse cx="35.5" cy="32.5" rx="4" ry="3.5" fill="rgba(255,255,255,0.25)"/>
<!-- Goggle reflection -->
<path d="M31 31 Q35 29 38 30 Q41 29 44 31" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
<ellipse cx="62" cy="35" rx="10" ry="9" fill="#451a03"/>
<ellipse cx="62" cy="35" rx="9.5" ry="8.5" fill="url(#lens)"/>
<ellipse cx="62" cy="35" rx="9.5" ry="8.5" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
<ellipse cx="59.5" cy="32.5" rx="4" ry="3.5" fill="rgba(255,255,255,0.25)"/>
<path d="M55 31 Q59 29 62 30 Q65 29 68 31" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
<!-- Goggle bridge -->
<rect x="46" y="33" width="8" height="4" rx="2" fill="#1c1917"/>
<!-- Below goggles - nose and mouth -->
<path d="M47 46 Q45 50 47.5 53 Q50 55 52.5 53 Q55 50 53 46" fill="rgba(200,110,60,0.3)"/>
<path d="M41 59 Q46 63 50 63 Q54 63 59 59" stroke="#a0614a" stroke-width="2" fill="none" stroke-linecap="round"/>
<!-- Cocky grin line -->
<path d="M41 59 Q44 57 46 58" stroke="#c87941" stroke-width="1" fill="none"/>
<!-- Lightning particles -->
<circle cx="18" cy="22" r="2.5" fill="#fbbf24" opacity="0.7" filter="url(#glow)"/>
<path d="M17 21 L18 17 M16 22 L13 21 M18 18 L20 16" stroke="#fef08a" stroke-width="1" opacity="0.7"/>
<circle cx="84" cy="28" r="2" fill="#fbbf24" opacity="0.6" filter="url(#glow)"/>
<path d="M83 26 L84 23 M82 28 L79 27 M84 24 L86 22" stroke="#fef08a" stroke-width="0.9" opacity="0.6"/>
</svg>
