<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Zenith Black Super Saiyan hero avatar">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="60%" stop-color="#0d0816"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7b3"/>
      <stop offset="55%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="suitHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <circle cx="256" cy="262" r="188" fill="url(#aura)"/>
  <circle cx="256" cy="262" r="206" fill="none" stroke="#fbbf24" stroke-width="8" stroke-opacity="0.3"/>
  <circle cx="256" cy="262" r="160" fill="none" stroke="#fde68a" stroke-width="5" stroke-opacity="0.2"/>

  <!-- Spiky super saiyan hair -->
  <path d="M123 182L164 147L172 101L207 138L235 81L261 136L288 79L313 136L347 98L355 149L392 178L356 192L366 229L329 217L306 244L257 250L209 245L185 218L147 228L158 193Z"
        fill="url(#hair)" stroke="#f59e0b" stroke-width="6" stroke-linejoin="round"/>

  <!-- Head -->
  <ellipse cx="256" cy="224" rx="82" ry="66" fill="#6a422c"/>
  <ellipse cx="256" cy="234" rx="77" ry="56" fill="#7a4d33"/>

  <!-- Eyes + brows -->
  <path d="M209 216L234 209L244 215L236 225L208 226Z" fill="#2c1a12"/>
  <path d="M303 216L278 209L268 215L276 225L304 226Z" fill="#2c1a12"/>
  <ellipse cx="224" cy="228" rx="13" ry="8" fill="#f8fafc"/>
  <ellipse cx="288" cy="228" rx="13" ry="8" fill="#f8fafc"/>
  <circle cx="224" cy="228" r="4.2" fill="#0f172a"/>
  <circle cx="288" cy="228" r="4.2" fill="#0f172a"/>
  <circle cx="225.5" cy="226.8" r="1.1" fill="#ffffff"/>
  <circle cx="289.5" cy="226.8" r="1.1" fill="#ffffff"/>

  <!-- Nose + mouth -->
  <path d="M252 236L244 249L256 252" fill="none" stroke="#5f3a27" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M230 262Q256 278 282 262" fill="none" stroke="#2f1b13" stroke-width="6" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="234" y="276" width="44" height="32" rx="12" fill="#6a422c"/>

  <!-- Body (black suit) -->
  <path d="M170 310Q176 282 206 286H306Q336 282 342 310L356 428H156Z" fill="url(#suit)" stroke="#333333" stroke-width="5"/>
  <!-- Suit collar / V-neck detail -->
  <path d="M206 298L256 340L306 298" fill="none" stroke="#444444" stroke-width="8" stroke-linecap="round"/>
  <!-- Belt -->
  <rect x="178" y="352" width="156" height="20" rx="10" fill="#222222" stroke="#555555" stroke-width="2"/>
  <!-- Belt buckle -->
  <rect x="240" y="350" width="32" height="24" rx="6" fill="#f59e0b" opacity="0.85"/>
  <!-- Suit seam lines -->
  <line x1="256" y1="340" x2="256" y2="428" stroke="#2a2a2a" stroke-width="2" opacity="0.6"/>
  <!-- Shoulder pads -->
  <path d="M170 310Q160 298 150 306Q142 314 155 326Q168 336 178 322Z" fill="url(#suitHighlight)" stroke="#444" stroke-width="3"/>
  <path d="M342 310Q352 298 362 306Q370 314 357 326Q344 336 334 322Z" fill="url(#suitHighlight)" stroke="#444" stroke-width="3"/>

  <!-- Arms / fists -->
  <path d="M150 326Q120 340 115 368Q112 385 126 396Q142 406 160 398Q182 388 190 364Q196 342 180 328Q168 320 150 326Z"
        fill="#6f452f" stroke="#3a251b" stroke-width="4"/>
  <path d="M362 326Q392 340 397 368Q400 385 386 396Q370 406 352 398Q330 388 322 364Q316 342 332 328Q344 320 362 326Z"
        fill="#6f452f" stroke="#3a251b" stroke-width="4"/>

  <!-- Aura sparks -->
  <path d="M102 265L123 228L118 255H146L116 295L122 266Z" fill="#fde68a" opacity="0.85"/>
  <path d="M404 268L389 236L392 258H369L396 294L391 269Z" fill="#fde68a" opacity="0.85"/>
  <path d="M160 108L171 82L170 101H188L169 127L172 108Z" fill="#fbbf24" opacity="0.75"/>
  <path d="M352 108L341 82L342 101H324L343 127L340 108Z" fill="#fbbf24" opacity="0.75"/>
  <circle cx="121" cy="335" r="6" fill="#fde68a" opacity="0.72"/>
  <circle cx="397" cy="338" r="6" fill="#fde68a" opacity="0.72"/>
  <circle cx="92" cy="214" r="4" fill="#fbbf24" opacity="0.85"/>
  <circle cx="420" cy="214" r="4" fill="#fbbf24" opacity="0.85"/>
</svg>
