<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Fredoka One', cursive; background: linear-gradient(180deg,#38bdf8 0%,#7dd3fc 30%,#bae6fd 60%,#86efac 85%,#4ade80 100%); height: 100vh; overflow: hidden; }

/* TOP BAR */
.topbar { background: #fff; border-bottom: 3px solid #e8e8e8; padding: 8px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 3px 10px rgba(0,0,0,.12); }
.map-btn { background: #f0f4f8; border: 2px solid #d0d8e4; border-radius: 8px; color: #374151; font-family: 'Fredoka One',cursive; font-size: 13px; font-weight: 700; cursor: pointer; padding: 7px 14px; }
.cash { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }
.cash-dollar { font-size: 28px; font-weight: 900; color: #4ade80; font-family: 'Fredoka One',cursive; }
.cash-value { font-size: 26px; font-weight: 900; color: #16a34a; text-shadow: 1px 1px 0 rgba(0,0,0,.15); font-family: 'Fredoka One',cursive; }
.cash-label { font-size: 11px; color: #6b7280; letter-spacing: 2px; text-align: center; font-family: 'Fredoka One',cursive; }
.stats { display: flex; gap: 18px; align-items: center; }
.stat-val { font-size: 13px; font-weight: 700; font-family: 'Fredoka One',cursive; }
.stat-label { font-size: 10px; color: #6b7280; font-family: 'Fredoka One',cursive; }
.prime-btn { padding: 6px 11px; background: linear-gradient(135deg,#581c87,#7c3aed); border: 2px solid #a855f7; border-radius: 8px; color: #e9d5ff; font-family: 'Fredoka One',cursive; font-size: 9px; font-weight: 700; cursor: pointer; box-shadow: 0 0 10px rgba(168,85,247,.45); white-space: nowrap; }

/* MAIN AREA */
.main { display: grid; grid-template-rows: auto 1fr 150px; height: calc(100vh - 59px); }

/* FLOORS */
.floors { position: relative; display: flex; flex-direction: column-reverse; overflow: hidden; }
.floor { flex: 1; display: flex; align-items: stretch; border-bottom: 2px solid rgba(168,85,247,.3); border-left: 4px solid #a855f7; position: relative; }
.floor.locked { background: linear-gradient(90deg,#f8fafc,#f1f5f9); border-left-color: #d1d5db; border-bottom-color: #e2e8f0; }
.floor.active { background: linear-gradient(90deg,rgba(168,85,247,.07),#080c14 65%,rgba(168,85,247,.07)); }
.floor-left { width: 116px; flex-shrink: 0; display: flex; align-items: center; padding: 6px 6px 6px 14px; gap: 8px; border-right: 1px solid rgba(168,85,247,.22); }
.floor-badge { background: #a855f7; color: #fff; font-family: 'Fredoka One',cursive; font-size: 11px; font-weight: 900; border-radius: 5px; padding: 2px 6px; text-align: center; box-shadow: 0 2px 8px rgba(168,85,247,.55); }
.floor-mid { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 4px 10px 3px; }
.floor-name { font-family: 'Fredoka One',cursive; font-size: 10px; font-weight: 700; color: #a855f7; letter-spacing: .4px; align-self: flex-start; margin-bottom: 3px; }
.floor-right { flex-shrink: 0; width: 100px; padding: 5px 8px; display: flex; align-items: center; justify-content: center; }
.unlock-btn { width: 100%; min-height: 64px; background: linear-gradient(180deg,rgba(168,85,247,.8),rgba(168,85,247,.54)); border: 2px solid #a855f7; border-radius: 10px; font-family: 'Fredoka One',cursive; font-size: 12px; font-weight: 900; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; box-shadow: 0 4px 14px rgba(168,85,247,.44); }
.scroll-btn { position: absolute; right: 8px; width: 36px; height: 36px; background: #fff; border: 2px solid #3b82f6; border-radius: 10px; color: #3b82f6; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 2px 8px rgba(59,130,246,.3); display: flex; align-items: center; justify-content: center; z-index: 20; }
.scroll-up { top: 8px; }
.scroll-down { bottom: 8px; }

/* PROGRESS BAR */
.prog-wrap { width: 84%; height: 6px; background: rgba(0,0,0,.35); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
.prog-fill { height: 100%; background: linear-gradient(90deg,#a855f7,#a855f7cc); border-radius: 4px; box-shadow: 0 0 6px rgba(168,85,247,.8); }

/* BOTTOM CONTROLS */
.bottom { background: #fff; border-top: 3px solid #e8e8e8; display: flex; align-items: center; }
.elev-door { width: 120px; flex-shrink: 0; border-right: 2px solid #e8e8e8; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 6px 8px; background: #f8fafc; }
.elev-label { font-family: 'Fredoka One',cursive; font-size: 10px; color: #2563eb; font-weight: 700; letter-spacing: 1px; text-align: center; }
.pipeline { flex: 1; display: flex; align-items: center; justify-content: space-evenly; padding: 6px 20px; gap: 10px; }
.ctrl-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.produce-btn { background: #8b5cf6; border: 3px solid #7c3aed; color: #fff; border-radius: 12px; font-size: 16px; font-family: 'Fredoka One',cursive; padding: 10px 20px; box-shadow: 0 4px 12px rgba(124,58,237,.4); cursor: pointer; font-weight: 700; }
.send-btn { background: #2563eb; border: 3px solid #1d4ed8; color: #fff; border-radius: 12px; font-size: 16px; font-family: 'Fredoka One',cursive; padding: 10px 20px; box-shadow: 0 4px 12px rgba(37,99,235,.4); cursor: pointer; font-weight: 700; }
.compile-btn { background: #16a34a; border: 3px solid #15803d; color: #fff; border-radius: 12px; font-size: 16px; font-family: 'Fredoka One',cursive; padding: 10px 20px; box-shadow: 0 4px 12px rgba(22,163,74,.4); cursor: pointer; font-weight: 700; }
.ctrl-stat { font-family: 'Fredoka One',cursive; font-size: 11px; color: #a78bfa; }
.floor0-badge { background: #fbbf24; color: #0f2640; font-family: 'Fredoka One',cursive; font-size: 13px; font-weight: 900; border-radius: 7px; padding: 3px 10px; }
.worker { width: 44px; height: 70px; object-fit: contain; filter: drop-shadow(0 0 3px #a855f7); }
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="topbar">
  <button class="map-btn">← MAP</button>
  <div class="cash">
    <span class="cash-dollar">$</span>
    <div>
      <div class="cash-value">1,000</div>
      <div class="cash-label">DOLLARS</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat-val" style="color:#7c3aed">⚡ 0.0</div><div class="stat-label">PROD</div>
    <div class="stat-val" style="color:#2563eb">🛗 0.0</div><div class="stat-label">IDLE</div>
    <div class="stat-val" style="color:#16a34a">⚙️ 0.0</div><div class="stat-label">QUEUED</div>
  </div>
  <button class="prime-btn">⬡ PRIME REFACTOR</button>
</div>

<!-- MAIN -->
<div class="main">
  <!-- FLOORS -->
  <div class="floors">
    <button class="scroll-btn scroll-up">▲</button>
    <button class="scroll-btn scroll-down">▼</button>
    <!-- Floor 1 (active, purple) -->
    <div class="floor active" style="border-left-color:#a855f7">
      <div class="floor-left">
        <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:3px">
          <div class="floor-badge" style="background:#a855f7">1</div>
          <div style="width:32px;height:32px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px">📦</div>
          <div style="font-family:'Fredoka One',cursive;font-size:9px;color:rgba(168,85,247,.8);font-weight:700">0.0</div>
        </div>
        <div style="width:42px;height:42px;border-radius:50%;border:2px solid #a855f7;background:rgba(168,85,247,.18);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer">👤</div>
      </div>
      <div class="floor-mid">
        <div class="floor-name">SPELL LAB</div>
        <div class="prog-wrap"><div class="prog-fill" style="width:30%"></div></div>
        <div style="display:flex;gap:10px;align-items:flex-end">
          <img class="worker" src="/assets/coder.svg" />
        </div>
        <div style="font-family:'Fredoka One',cursive;font-size:9px;color:rgba(168,85,247,.6);margin-top:2px">+0.5 RC/s · LV 1 · 1w</div>
      </div>
      <div class="floor-right">
        <button class="unlock-btn" style="background:linear-gradient(180deg,rgba(168,85,247,.8),rgba(168,85,247,.54));border-color:#a855f7">
          <div>LV 2</div><div style="font-size:10px">$50</div><div style="font-size:8px">+0.3/s</div>
        </button>
      </div>
    </div>
    <!-- Floor 2 (locked) -->
    <div class="floor locked">
      <div class="floor-left">
        <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:3px">
          <div class="floor-badge" style="background:#94a3b8">2</div>
          <div style="font-family:'Fredoka One',cursive;font-size:9px;color:#2a4a6a">$50</div>
        </div>
        <div style="width:42px;height:42px;border-radius:50%;border:2px solid #1a2a40;background:#080c14;display:flex;align-items:center;justify-content:center;font-size:20px">💤</div>
      </div>
      <div class="floor-mid">
        <div style="font-family:'Fredoka One',cursive;font-size:10px;color:#94a3b8;align-self:flex-start;margin-bottom:3px">BATTLE DOJO</div>
        <div class="prog-wrap"><div class="prog-fill" style="width:0%;background:#1a2540"></div></div>
        <div style="display:flex;gap:10px;align-items:flex-end">
          <img class="worker" src="/assets/coder.svg" style="filter:grayscale(100%) brightness(30%)" />
        </div>
      </div>
      <div class="floor-right">
        <button class="unlock-btn" style="background:#f97316cc;border-color:#f97316">
          <div>UNLOCK</div><div style="font-size:10px">$50</div>
        </button>
      </div>
    </div>
    <!-- Floor 3 (locked) -->
    <div class="floor locked" style="border-left-color:#ec4899">
      <div class="floor-left">
        <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:3px">
          <div class="floor-badge" style="background:#6b7280">3</div>
          <div style="font-family:'Fredoka One',cursive;font-size:9px;color:#2a4a6a">$500</div>
        </div>
      </div>
      <div class="floor-mid">
        <div style="font-family:'Fredoka One',cursive;font-size:10px;color:#94a3b8;align-self:flex-start;margin-bottom:3px">MOON STUDIO</div>
        <div class="prog-wrap"><div class="prog-fill" style="width:0%;background:#1a2540"></div></div>
      </div>
      <div class="floor-right">
        <button class="unlock-btn" style="background:#080c14;border:2px solid #1a2540;box-shadow:none">
          <div style="color:#1e3a5f">UNLOCK</div><div style="font-size:10px;color:#1a2a40">$500</div>
        </button>
      </div>
    </div>
    <!-- Floor 4 (locked) -->
    <div class="floor locked">
      <div class="floor-left">
        <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:3px">
          <div class="floor-badge" style="background:#6b7280">4</div>
          <div style="font-family:'Fredoka One',cursive;font-size:9px;color:#2a4a6a">$5K</div>
        </div>
      </div>
      <div class="floor-mid">
        <div style="font-family:'Fredoka One',cursive;font-size:10px;color:#94a3b8;align-self:flex-start;margin-bottom:3px">SPEED DESK</div>
        <div class="prog-wrap"></div>
      </div>
      <div class="floor-right">
        <button class="unlock-btn" style="background:#080c14;border:2px solid #1a2540;box-shadow:none">
          <div style="color:#1e3a5f">UNLOCK</div><div style="font-size:10px;color:#1a2a40">$5K</div>
        </button>
      </div>
    </div>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="bottom">
    <div class="elev-door">
      <div class="elev-label">🛗 ELEVATOR DOOR</div>
      <div style="font-size:28px">📦</div>
      <div style="font-family:'Fredoka One',cursive;font-size:18px;color:#374151;font-weight:900">0.0</div>
      <div style="width:80%;height:4px;background:rgba(0,212,255,.12);border-radius:3px;overflow:hidden"><div style="width:0%;height:100%;background:linear-gradient(90deg,#0050aa,#00d4ff)"></div></div>
      <div style="font-family:'Fredoka One',cursive;font-size:9px;color:#9ca3af;letter-spacing:1px">WAREHOUSE BUFFER</div>
    </div>
    <div class="pipeline">
      <div class="ctrl-group">
        <div class="floor0-badge">FLOOR 0</div>
        <div style="font-family:'Fredoka One',cursive;font-size:10px;color:#6b7280">SALES WAREHOUSE</div>
        <div style="font-size:20px">🏢</div>
      </div>
      <div class="ctrl-group">
        <button class="produce-btn">⚡ PRODUCE</button>
        <div class="ctrl-stat">0.0/150</div>
        <div style="width:90px;height:4px;background:rgba(167,139,250,.15);border-radius:3px;overflow:hidden"><div style="width:2%;height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7)"></div></div>
      </div>
      <div class="ctrl-group">
        <button class="send-btn">🛗 SEND</button>
        <div style="font-family:'Fredoka One',cursive;font-size:10px;color:#60a5fa">IDLE</div>
      </div>
      <div class="ctrl-group">
        <div style="display:flex;align-items:flex-end;gap:5px;height:58px;margin-bottom:2px">
          <span style="font-size:32px">🖥️</span>
          <img src="/assets/coder.svg" style="height:48px;width:auto;filter:drop-shadow(0 0 4px rgba(34,197,94,.6))" />
        </div>
        <button class="compile-btn">⚙️ COMPILE</button>
        <div style="font-family:'Fredoka One',cursive;font-size:10px;color:#64748b">READY</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
