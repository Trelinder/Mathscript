# Nginx reverse proxy config for MathScript on Oracle Cloud
# Install: sudo cp nginx-mathscript.conf /etc/nginx/sites-available/mathscript
#          sudo ln -s /etc/nginx/sites-available/mathscript /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# For SSL: sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_ORACLE_IP;

    # Increase timeouts for AI story generation (can take 20-30s)
    proxy_read_timeout    90s;
    proxy_connect_timeout 30s;
    proxy_send_timeout    90s;

    # Increase body size for image uploads / base64 payloads
    client_max_body_size 10M;

    location / {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # After Spring Boot migration: change proxy_pass to http://localhost:8080
}
